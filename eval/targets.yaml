# Target registry. Required fields per target: kind, requires, lifted_program, entry_addr,
# exit_point, theorem_name, params. Optional gold_invariant / gold_proof short-circuit the LLM.
#
# Theorem-builder knobs (all OPTIONAL; omit to keep the addloop defaults shown):
#   requires:         Coq modules emitted as `Require Import <m>.` (NArith / Picinae_riscv are
#                     always prepended; `Import RISCVNotations.` always follows).
#   lifted_program:   in-scope name of the lifted program in the goal   (default: lifted_prog)
#   exit_point:       in-scope name of the exit predicate               (default: exits)
#   theorem_name:     name of the generated Theorem.
#   params:           binders for the invariant. Each is [name, type] or, to drive an entry
#                     hypothesis, [name, type, reg] e.g. ["x", "N", "R_T0"] -> (T0: s R_T0 = x).
#                     If no param carries a reg, the first two fall back to R_T0 / R_T1.
#   timing_functor:   functor instantiated as `Module Inner := <f> cpu.`  (default: TimingProof)
#   timing_submodule: imported as `Import Inner.<m>.`                    (default: RISCVTiming)
#   program_module:   imported as `Import Inner.<m>.`                    (default: Program_addloop)
#   auto_module:      imported as `Import Inner.<m>.`                    (default: addloopAuto)
#   cpu_module / cpu_config: concrete CPU instantiation at file end (default: NEORV32 / NEORV32BaseConfig)

addloop:
  kind: wcet
  description: "Peano addition loop; one loop, one invariant. Pipeline smoke test."
  requires: ["NEORV32", "RISCVTiming", "riscv_addloop_timing_proof"]
  lifted_program: lifted_prog
  entry_addr: 0x8
  exit_point: exits
  theorem_name: addloop_timing_gen
  params: [["x", "N"], ["y", "N"]]
  objdump: targets/addloop.objdump
  gold_invariant: ../vendor/picinae/timing/examples/riscv_addloop_timing_proof.v
  gold_proof:
    - "intros."
    - "apply prove_invs."
    - "simpl. rewrite ENTRY. tstep r5_step."
    - "split. assumption. split. assumption. hammer."
    - "intros."
    - "eapply startof_prefix in ENTRY; try eassumption."
    - "eapply preservation_exec_prog in MDL; try (eassumption || apply lift_riscv_welltyped)."
    - "clear - PRE MDL. rename t1 into t. rename s1 into s'."
    - "destruct_inv 32 PRE."
    - "destruct PRE as [T0 [T2 Cycles]]. repeat (tstep r5_step). repeat split; try assumption. lia. hammer."
    - "destruct PRE as [T2 [T3 [T0 Cycles_t]]]. tstep r5_step. hammer."
    - "tstep r5_step. tstep r5_step. tstep r5_step. rewrite msub_nowrap by (psimpl; lia). repeat split. lia. hammer. rewrite N_sub_distr; lia."
  gold_cycles: null

addloop_llm:
  # Synthesis-branch twin of addloop: same program, but no gold_invariant and no
  # gold_proof, so the orchestrator must call invariant_synth.synthesize (llm_calls >= 1).
  # objdump is kept so a real CFG description is built. Reusing the addloop program
  # isolates "does synthesis produce a closable invariant" from theorem-builder
  # generalization (task 2).
  kind: wcet
  description: "Peano addition loop; synthesis-branch twin of addloop (no gold hints)."
  requires: ["NEORV32", "RISCVTiming", "riscv_addloop_timing_proof"]
  lifted_program: lifted_prog
  entry_addr: 0x8
  exit_point: exits
  theorem_name: addloop_timing_gen
  params: [["x", "N"], ["y", "N"]]
  objdump: targets/addloop.objdump
  # Pinned exit-arm (WCET claim) for skeleton synthesis: only the loop/entry arms are holes for
  # the model; this is spliced in verbatim. Matches the vendored addloop 0x20 arm.
  postcondition: "cycle_count_of_trace t' = tori + tandi + x * (tfbeq + taddi + tsub + ttbeq) + ttbeq"
  gold_cycles: null

ct_swap:
  # First constant-time target. The vendored OpenSSL-style ct_swap swaps two uint32 arrays
  # element-wise under a secret mask; signature ct_swap(secret a0, *a a1, *b a2, len a3). The
  # whole point is that the *timing* depends only on the public length, never on the array data
  # or the swap mask. Reuses the vendored proof exactly like addloop (functor TimingProof in
  # crypto/ct_swap/ct_swap_proof.v): requires names it, gold_invariant pulls its invariant set.
  #
  # secret_param: base_addr_b — the a2 data pointer. It appears in the invariant (register ties
  # and pointer arithmetic) yet every `cycle_count_of_trace t' = ...` arm is a closed form in
  # `len`/`index` ONLY, never in base_addr_b: timing is provably independent of the data address
  # (address-independence, the structural constant-time obligation spec_lint enforces). The a0
  # mask itself never enters the timing invariant at all, so there is no token to pin it to.
  kind: ct
  description: "Constant-time conditional swap of two uint32 arrays; one fixed-bound loop over len."
  requires: ["NEORV32", "RISCVTiming", "ct_swap_proof"]
  lifted_program: lifted_prog
  entry_addr: 0x1e4
  exit_point: exits
  theorem_name: ct_swap_timing_gen
  program_module: Program_ct_swap
  auto_module: ct_swapAuto
  # a3 = len, a2 = base pointer of array b (NOT addloop's R_T0/R_T1 convention).
  params: [["len", "N", "R_A3"], ["base_addr_b", "N", "R_A2"]]
  # Well-formedness preconditions the loop needs but that are not single register ties; trusted,
  # from the spec, so they constrain inputs without touching the pinned postcondition.
  entry_hyps:
    - ["PTR_ALIGN", "exists k', base_addr_b = 4 * k'"]
    - ["LEN_VALID", "4 * len < 2^32"]
  secret_param: base_addr_b
  gold_invariant: ../vendor/picinae/timing/examples/crypto/ct_swap/ct_swap_proof.v
  gold_proof:
    - "intros."
    - "apply prove_invs."
    - "simpl. rewrite ENTRY. unfold entry_addr. tstep r5_step. now repeat split."
    - "intros."
    - "eapply startof_prefix in ENTRY; try eassumption."
    - "eapply preservation_exec_prog in MDL; try eassumption; [idtac|apply lift_riscv_welltyped]."
    - "clear - ENTRY PRE MDL. rename t1 into t. rename s1 into s'."
    - "destruct_inv 32 PRE."
    - 'destruct PRE as (LEN_VALID & PTR_ALIGN & A3 & A2 & init). repeat (tstep r5_step). handle_ex. exists 0. split. lia. split. now psimpl. hammer.'
    - 'destruct PRE as (LEN_VALID & PTR_ALIGN & FINAL_PTR & INDEX & INDEX_VALID & MOVING_PTR & CCOT). repeat (tstep r5_step). handle_ex. exists (1 + INDEX). split. assert (forall n m, n <= m -> n=m \/ n < m); lia. split. lia. hammer.'
    - "hammer. replace INDEX with len; lia."
  # Closed form (len-parameterized, not a single constant): see crypto/ct_swap/equation.txt.
  gold_cycles: "17 + len * (42 + 5 * T_data_latency + 2 * T_inst_latency) + T_inst_latency"

ct_swap_llm:
  # Synthesis-branch twin of ct_swap: no gold_invariant / gold_proof, so the orchestrator must
  # call invariant_synth.synthesize (llm_calls >= 1). objdump kept so a real CFG description is
  # built; the constant-time arm of spec_lint still requires secret_param in whatever the model
  # proposes. Reuses the ct_swap program so this measures synthesis, not theorem-builder work.
  kind: ct
  description: "Constant-time conditional swap; synthesis-branch twin of ct_swap (no gold hints)."
  requires: ["NEORV32", "RISCVTiming", "ct_swap_proof"]
  lifted_program: lifted_prog
  entry_addr: 0x1e4
  exit_point: exits
  theorem_name: ct_swap_timing_gen
  program_module: Program_ct_swap
  auto_module: ct_swapAuto
  params: [["len", "N", "R_A3"], ["base_addr_b", "N", "R_A2"]]
  entry_hyps:
    - ["PTR_ALIGN", "exists k', base_addr_b = 4 * k'"]
    - ["LEN_VALID", "4 * len < 2^32"]
  secret_param: base_addr_b
  objdump: targets/ct_swap.objdump
  # Pinned exit-arm (the trusted ct/WCET claim) for skeleton synthesis; only loop/entry arms are
  # holes for the model. Mirrors the vendored 0x1f4 arm (time_of_ct_swap is in the imported scope).
  postcondition: "cycle_count_of_trace t' = tslli 2 + tsub + tadd + len * (ttbne + tlw + tlw + taddi + taddi + txor + tand + txor + tsw + tlw + txor + tsw + tjal) + tfbne + tjalr"
  gold_cycles: "17 + len * (42 + 5 * T_data_latency + 2 * T_inst_latency) + T_inst_latency"

# ---------------------------------------------------------------------------
# Task B — FreeRTOS list.c "easy four" (first WCET eval set, M2 exit criterion).
# Four gold-labeled, mostly straight-line functions from the vendored FreeRTOS demo
# (binary := RTOSDemo). vListInsert (the cyclic-list search loop) is deliberately EXCLUDED.
# All take a List_t*/ListItem_t* in a0 (vListInsertEnd takes a second pointer in a1); the
# vendored timing invariants parameterize only by (base_mem, a0), so a1 is added as a non-
# invariant ABI binder via extra_binders. gold_cycles are the paper Fig. 5 measured WCET
# (range in parens). NOTE: measured counts include CALLING_CONVENTION_CYCLES = 11 of call
# overhead (caller's jal + callee's ret accounting) — an FPGA-oracle concern recorded now.
# The straight-line three share an identical gold proof (YAML anchor); uxListRemove has an
# extra branch invariant point (0x80002460) + memory-noverlap side conditions, so its gold
# proof is bespoke. The hammer ladder cannot drive a top-level satisfies_all goal, so each
# carries a gold_proof.
# ---------------------------------------------------------------------------

vListInitialise:
  kind: wcet
  description: "FreeRTOS vListInitialise: straight-line list-head init, entry + exit only."
  requires: ["NEORV32", "RISCVTiming", "vListInitialise"]
  lifted_program: lifted_prog
  entry_addr: 0x8000239c
  exit_point: exits
  theorem_name: vListInitialise_timing_gen
  program_module: Program_vListInitialise
  auto_module: vListInitialiseAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  gold_invariant: ../vendor/picinae/timing/examples/FreeRTOS/list/vListInitialise.v
  gold_proof: &straightline_gold_proof
    - "intros."
    - "apply prove_invs."
    - "simpl. rewrite ENTRY. unfold entry_addr. now (tstep r5_step)."
    - "intros."
    - "eapply startof_prefix in ENTRY; try eassumption."
    - "eapply preservation_exec_prog in MDL; try eassumption; [idtac|apply lift_riscv_welltyped]."
    - "clear - ENTRY PRE MDL. rename t1 into t. rename s1 into s'."
    - "destruct_inv 32 PRE."
    - "repeat (tstep r5_step). hammer."
  gold_cycles: 34   # Fig. 5 measured (range 29-42); includes CALLING_CONVENTION_CYCLES = 11

vListInitialiseItem:
  kind: wcet
  description: "FreeRTOS vListInitialiseItem: straight-line list-item init (sw; ret), entry + exit only."
  requires: ["NEORV32", "RISCVTiming", "vListInitialiseItem"]
  lifted_program: lifted_prog
  entry_addr: 0x800023bc
  exit_point: exits
  theorem_name: vListInitialiseItem_timing_gen
  program_module: Program_vListInitialiseItem
  auto_module: vListInitialiseItemAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  gold_invariant: ../vendor/picinae/timing/examples/FreeRTOS/list/vListInitialiseItem.v
  gold_proof: *straightline_gold_proof
  gold_cycles: 10   # Fig. 5 measured (range 9-14); includes CALLING_CONVENTION_CYCLES = 11

vListInsertEnd:
  kind: wcet
  description: "FreeRTOS vListInsertEnd: straight-line append to list end, entry + exit only."
  requires: ["NEORV32", "RISCVTiming", "vListInsertEnd"]
  lifted_program: lifted_prog
  entry_addr: 0x800023c4
  exit_point: exits
  theorem_name: vListInsertEnd_timing_gen
  program_module: Program_vListInsertEnd
  auto_module: vListInsertEndAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  # vListInsertEnd(List_t *pxList=a0, ListItem_t *pxNewListItem=a1). The vendored invariant
  # ignores a1, so it is a non-invariant ABI binder (forall a1 + (A1: s R_A1 = a1)), not an inv arg.
  extra_binders: [["a1", "N", "R_A1"]]
  gold_invariant: ../vendor/picinae/timing/examples/FreeRTOS/list/vListInsertEnd.v
  gold_proof: *straightline_gold_proof
  gold_cycles: 54   # Fig. 5 measured (range 43-64); includes CALLING_CONVENTION_CYCLES = 11

uxListRemove:
  kind: wcet
  description: "FreeRTOS uxListRemove: unlink an item; one branch (no loop), three invariant points."
  requires: ["NEORV32", "RISCVTiming", "uxListRemove"]
  lifted_program: lifted_prog
  entry_addr: 0x80002440
  exit_point: exits
  theorem_name: uxListRemove_timing_gen
  program_module: Program_uxListRemove
  auto_module: uxListRemoveAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  # Memory-noverlap + memory-binding side conditions the proof needs (trusted, from the spec).
  entry_hyps:
    - ["NVL", "create_noverlaps (memory_regions base_mem a0)"]
    - ["MEM", "s V_MEM32 = base_mem"]
  gold_invariant: ../vendor/picinae/timing/examples/FreeRTOS/list/uxListRemove.v
  gold_proof:
    - "intros."
    - "apply prove_invs."
    - "simpl. rewrite ENTRY. unfold entry_addr. now (tstep r5_step)."
    - "intros."
    - "eapply startof_prefix in ENTRY; try eassumption."
    - "eapply preservation_exec_prog in MDL; try eassumption; [idtac|apply lift_riscv_welltyped]."
    - "clear - ENTRY PRE MDL. rename t1 into t. rename s1 into s'."
    - "destruct_inv 32 PRE."
    - "destruct PRE as (cycles & A0 & NVL & MEM)."
    - "repeat (tstep r5_step)."
    - "{ split. noverlaps_preserved ltac:(unfold noverlaps, memory_regions, pxNext, pxPrevious, pxContainer, pxIndex in *). hammer. unfold noverlaps, memory_regions, pxNext, pxPrevious, pxContainer, pxIndex in *. unfold_create_noverlaps. rewrite getmem_noverlap, getmem_noverlap in BC by (auto using noverlap_symmetry). find_rewrites. lia. }"
    - "{ split. noverlaps_preserved ltac:(unfold noverlaps, memory_regions, pxNext, pxPrevious, pxContainer, pxIndex in *). hammer. unfold noverlaps, memory_regions, pxNext, pxPrevious, pxContainer, pxIndex in *. unfold_create_noverlaps. rewrite getmem_noverlap, getmem_noverlap in BC by (auto using noverlap_symmetry). find_rewrites. lia. }"
    - "destruct PRE as (NVL & Cycles)."
    - "repeat (tstep r5_step). hammer."
  gold_cycles: 59   # Fig. 5 measured (range 48-72); includes CALLING_CONVENTION_CYCLES = 11

# --- Synthesis twins (gold removed, objdump kept -> orchestrator must synthesize). These are
# the measured eval set for the success-rate table. Freeform synthesis (no pinned postcondition)
# so the model writes the whole invariant; the objdump gives a real instruction-level CFG prompt.

vListInitialise_llm:
  kind: wcet
  description: "Synthesis twin of vListInitialise (no gold hints)."
  requires: ["NEORV32", "RISCVTiming", "vListInitialise"]
  lifted_program: lifted_prog
  entry_addr: 0x8000239c
  exit_point: exits
  theorem_name: vListInitialise_timing_gen
  program_module: Program_vListInitialise
  auto_module: vListInitialiseAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  objdump: targets/vListInitialise.objdump
  # Pinned exit arm (the trusted WCET claim); skeleton synthesis fills only the entry hole.
  # time_of_vListInitialise is in the imported vendored functor scope.
  postcondition: "time_of_vListInitialise t"

vListInitialiseItem_llm:
  kind: wcet
  description: "Synthesis twin of vListInitialiseItem (no gold hints)."
  requires: ["NEORV32", "RISCVTiming", "vListInitialiseItem"]
  lifted_program: lifted_prog
  entry_addr: 0x800023bc
  exit_point: exits
  theorem_name: vListInitialiseItem_timing_gen
  program_module: Program_vListInitialiseItem
  auto_module: vListInitialiseItemAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  objdump: targets/vListInitialiseItem.objdump
  postcondition: "time_of_vListInitialiseItem t"

vListInsertEnd_llm:
  kind: wcet
  description: "Synthesis twin of vListInsertEnd (no gold hints)."
  requires: ["NEORV32", "RISCVTiming", "vListInsertEnd"]
  lifted_program: lifted_prog
  entry_addr: 0x800023c4
  exit_point: exits
  theorem_name: vListInsertEnd_timing_gen
  program_module: Program_vListInsertEnd
  auto_module: vListInsertEndAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  extra_binders: [["a1", "N", "R_A1"]]
  objdump: targets/vListInsertEnd.objdump
  postcondition: "time_of_vListInsertEnd t"

uxListRemove_llm:
  kind: wcet
  description: "Synthesis twin of uxListRemove (no gold hints)."
  requires: ["NEORV32", "RISCVTiming", "uxListRemove"]
  lifted_program: lifted_prog
  entry_addr: 0x80002440
  exit_point: exits
  theorem_name: uxListRemove_timing_gen
  program_module: Program_uxListRemove
  auto_module: uxListRemoveAuto
  params: [["base_mem", "memory"], ["a0", "N", "R_A0"]]
  entry_hyps:
    - ["NVL", "create_noverlaps (memory_regions base_mem a0)"]
    - ["MEM", "s V_MEM32 = base_mem"]
  objdump: targets/uxListRemove.objdump
  postcondition: "time_of_uxListRemove t base_mem a0"

# Named eval groups (resolved by `cloq-agent eval <group>`); not targets themselves.
groups:
  list_easy_four:
    - vListInitialise_llm
    - vListInitialiseItem_llm
    - vListInsertEnd_llm
    - uxListRemove_llm
