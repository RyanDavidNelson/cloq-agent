# CI: lint -> build proofs (smoke) -> python tests -> eval regression gate.
stages: [lint, build, test, eval]

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

ruff:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check src eval fpga/host

rocq-smoke:
  stage: build
  image: coqorg/coq:8.20
  script:
    - eval $(opam env)
    - opam install -y coq-lsp coq-hammer coq-hammer-tactics || true
    - git submodule update --init --recursive
    - make -C proofs smoke
  allow_failure: true   # until vendor/picinae module names are reconciled (see Addloop.v note)

pytest:
  stage: test
  image: python:3.11-slim
  script:
    - pip install uv && uv pip install --system -e ".[dev]"
    - pytest -q tests

regression:
  stage: eval
  image: python:3.11-slim
  needs: ["pytest"]
  script:
    # the regression gate: every previously-solved target must still prove.
    # Requires a reachable pet-server + model server; runs in the nightly pipeline.
    - pip install uv && uv pip install --system -e ".[rag]"
    - cloq-agent eval --only addloop
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
