# Profiles (lab ergonomics — one command per workflow):
#   docker compose --profile api   up   -> rocq + api + gui   (web app: GUI :8080, API :8000; cloud model)
#   docker compose --profile local up   -> rocq + agent + toolchain + ollama   (CLI / local model)
#
# Secrets + model overrides come from ../.env (copy ../.env.example). rag_store/ and runs/ are
# named volumes so the corpus and job artifacts persist across `up`/`down`.
services:
  # RISC-V cross toolchain for the compile stage (CLI prove-c). Standalone:
  #   docker compose run --rm toolchain bash -lc 'riscv64-unknown-elf-gcc ... -c /work/foo.c'
  toolchain:
    profiles: ["local"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.toolchain
    volumes:
      - ..:/work
    command: ["riscv64-unknown-elf-gcc", "--version"]

  rocq:
    profiles: ["api", "local"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.rocq
    ports:
      - "8765:8765"          # petanque
    volumes:
      - ../proofs:/work/proofs

  # Optional bundled local model (no GPU config so `up` works anywhere; add `gpus: all` for speed).
  # Pull a model into it once:  docker compose exec ollama ollama pull qwen3-coder:30b
  ollama:
    profiles: ["local"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  agent:
    profiles: ["local"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    depends_on:
      - rocq
    env_file:
      - path: ../.env          # CLOQ_API_KEY (cloud escalation), optional model overrides
        required: false
    environment:
      CLOQ_PROFILE: local
      CLOQ_PETANQUE_HOST: rocq
      CLOQ_PETANQUE_WORKSPACE: /work/proofs
      # Host Ollama by default (the lab GPU box); repoint to the bundled service with
      # CLOQ_MODEL_BASE_URL=http://ollama:11434/v1 to use the `ollama` container instead.
      CLOQ_MODEL_BASE_URL: http://host.docker.internal:11434/v1
      CLOQ_RAG_STORE_DIR: /data/rag_store
      CLOQ_EVAL_OUT_DIR: /data/runs
      PYTHONPATH: /app
    volumes:
      - ..:/app
      - ../proofs:/work/proofs
      - rag_store:/data/rag_store
      - runs:/data/runs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--help"]     # interactive: docker compose run --rm agent prove addloop

  # Backend API: upload machine code, run jobs in a worker, stream stages. Cloud model -> no Ollama.
  api:
    profiles: ["api"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      - rocq
    ports:
      - "8000:8000"
    env_file:
      - path: ../.env          # CLOQ_API_KEY (required for the cloud model), optional overrides
        required: false
    environment:
      CLOQ_PROFILE: api        # cloud-primary, escalation off (config/api.yaml)
      CLOQ_PETANQUE_HOST: rocq
      CLOQ_PETANQUE_WORKSPACE: /work/proofs
      CLOQ_RAG_STORE_DIR: /data/rag_store
      CLOQ_EVAL_OUT_DIR: /data/runs
    volumes:
      - ../proofs:/work/proofs
      - rag_store:/data/rag_store
      - runs:/data/runs

  # Web GUI: serves the SPA and reverse-proxies /api -> api (same origin, SSE passes through).
  gui:
    profiles: ["api"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.gui
    depends_on:
      - api
    ports:
      - "8080:8080"

volumes:
  rag_store:
  runs:
  ollama_models:
