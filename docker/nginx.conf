server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API (strip the /api prefix). Resolve the upstream at request time via
    # Docker's embedded DNS (127.0.0.11) and a variable, so nginx starts even if the api service
    # isn't up yet (no boot-time "host not found in upstream" hard-fail).
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $api_upstream api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Server-Sent Events: no buffering, keep the connection open.
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
