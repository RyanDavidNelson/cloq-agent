# GitLab CI/CD for cloq-agent — a faithful mirror of .github/workflows/{ci,build}.yml.
# Keep the two pipelines in sync: lint -> test -> smoke -> build.
#
#   lint        ruff check src eval api
#   test        pytest (integration-search tests skip without a pet-server, as on any CI runner)
#   smoke       build the rocq image and prove `addloop` (make -C proofs smoke) — a REAL gate,
#               not allow_failure, exactly like rocq-smoke on GitHub
#   build       build the container images; push to the GitLab registry on tags / on demand
#
# The smoke + build jobs use Docker-in-Docker, so the runner must allow privileged services.

stages:
  - lint
  - test
  - smoke
  - build

variables:
  # vendor/picinae is a submodule the rocq image needs; fetch it (and any nested) on every job.
  GIT_SUBMODULE_STRATEGY: recursive
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

lint:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install ruff
  script:
    - ruff check src eval api

pytest:
  stage: test
  image: python:3.11-slim
  before_script:
    # `[dev]` pulls pytanque from git (see [tool.uv.sources]); git must be present.
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - pip install uv
    - uv pip install --system -e ".[dev]"
  script:
    # The integration-search tests skip automatically when no pet-server is reachable (the case on
    # any CI runner). Everything else must pass.
    - pytest -q tests

rocq-smoke:
  stage: smoke
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  timeout: 2h
  script:
    # Build the rocq image (Picinae/Cloq + the addloop timing proof) and run the smoke gate:
    # addloop closes end-to-end against the prebuilt Picinae .vo files.
    - docker build -f docker/Dockerfile.rocq -t cloq-rocq:ci .
    - docker run --rm cloq-rocq:ci bash -lc "eval \$(opam env) && make -C /work/proofs smoke"

# Build the container images. Pushes to the GitLab Container Registry on tags; manual otherwise.
build-images:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  timeout: 2h
  rules:
    - if: '$CI_COMMIT_TAG'                 # always build (and push) on version tags
    - when: manual                        # otherwise on-demand, never blocking the pipeline
      allow_failure: true
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      for component in rocq agent toolchain api gui; do
        tag="$CI_REGISTRY_IMAGE/$component:${CI_COMMIT_TAG:-$CI_COMMIT_REF_SLUG}"
        echo "building $tag"
        docker build -f "docker/Dockerfile.$component" -t "$tag" .
        if [ -n "$CI_COMMIT_TAG" ]; then docker push "$tag"; fi
      done
