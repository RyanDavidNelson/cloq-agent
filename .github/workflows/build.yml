# Build the container images. Pushes to GHCR on version tags (vX.Y.Z). No FPGA images.
# Dockerfile.toolchain and Dockerfile.gui are planned (Phase 2/3); their matrix legs no-op
# until the files exist, so this workflow stays green on a clean clone.
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - { component: rocq, dockerfile: docker/Dockerfile.rocq }
          - { component: agent, dockerfile: docker/Dockerfile.agent }
          - { component: toolchain, dockerfile: docker/Dockerfile.toolchain }
          - { component: api, dockerfile: docker/Dockerfile.api }
          - { component: gui, dockerfile: docker/Dockerfile.gui }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Check Dockerfile exists
        id: check
        run: |
          if [ -f "${{ matrix.dockerfile }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::${{ matrix.dockerfile }} not present yet — skipping ${{ matrix.component }}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'true'
      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        if: steps.check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - name: Build (and push on tags)
        if: steps.check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
