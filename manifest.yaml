# cloq-agent held-out generalization test set -- manifest.
#
# `expected: prove`   -> should close once the named phase lands.
# `expected: ceiling` -> must STAY at the ceiling (fail-fast diagnostic).
# `unblocked_by`      -> which phase of the discharge work this measures.
# `premises`          -> well-formedness hypotheses the proof will assume; each
#                        ASSUMED premise must also pass the satisfiability gate
#                        (exists a state/memory satisfying it) now that there is
#                        no FPGA oracle -- otherwise a false premise => vacuous.
# Registers: ilp32 ABI, integer args in a0,a1,a2,... (a0=R_A0, ...).

# ----------------------------------------------------------------- Tier A: controls
- func: sl_sum3
  file: tierA_controls.c
  kind: wcet
  expected: prove
  unblocked_by: none            # already works (straight-line)
  class: straight-line
  params: [["x","N","R_A0"], ["y","N","R_A1"], ["z","N","R_A2"]]
  exercises: [regression-guard]

- func: cl_countdown
  file: tierA_controls.c
  kind: wcet
  expected: prove
  unblocked_by: none            # already works (counter loop)
  class: counter-loop
  params: [["n","N","R_A0"]]
  premises: ["N_VALID: n < 2^32"]
  exercises: [counter-loop-generalizes-off-addloop]

# --------------------------------------------------- Tier B: array/pointer (Phase 1)
- func: ap_sum_u32
  file: tierB_array_ptr.c
  kind: wcet
  expected: prove
  unblocked_by: phase1
  class: array/pointer loop
  params: [["a","N","R_A0"], ["len","N","R_A1"]]
  premises: ["LEN_VALID: 4*len < 2^32", "PTR_ALIGN: exists k, a = 4*k"]
  exercises: [explicit-witness, canonical-conjunct-order, word-stride]

- func: ap_sum_u8
  file: tierB_array_ptr.c
  kind: wcet
  expected: prove
  unblocked_by: phase1
  class: array/pointer loop
  params: [["a","N","R_A0"], ["len","N","R_A1"]]
  premises: ["LEN_VALID: len < 2^32"]
  exercises: [byte-stride, stride-generalization]

- func: ap_scale_inplace
  file: tierB_array_ptr.c
  kind: wcet
  expected: prove
  unblocked_by: phase1
  class: array/pointer loop      # single-region store -> NOT aliasing
  params: [["a","N","R_A0"], ["len","N","R_A1"], ["k","N","R_A2"]]
  premises: ["LEN_VALID: 4*len < 2^32", "PTR_ALIGN: exists j, a = 4*j"]
  exercises: [store-in-loop-is-not-aliasing, tmul-in-model]

- func: ap_dot2
  file: tierB_array_ptr.c
  kind: wcet
  expected: prove
  unblocked_by: phase1
  class: array/pointer loop
  params: [["a","N","R_A0"], ["b","N","R_A1"], ["len","N","R_A2"]]
  premises: ["LEN_VALID: 4*len < 2^32",
             "ALIGN_A: exists j, a = 4*j", "ALIGN_B: exists k, b = 4*k"]
  exercises: [two-base-pointers, read-only-no-aliasing]

- func: ap_ptr_walk
  file: tierB_array_ptr.c
  kind: wcet
  expected: prove
  unblocked_by: phase1
  class: array/pointer loop
  params: [["p","N","R_A0"], ["count","N","R_A1"]]
  premises: ["CNT_VALID: 4*count < 2^32", "PTR_ALIGN: exists k, p = 4*k"]
  exercises: [pointer-increment-induction]

- func: ct_cond_not
  file: tierB_array_ptr.c
  kind: ct
  expected: prove
  unblocked_by: phase1
  class: array/pointer loop
  params: [["a","N","R_A0"], ["len","N","R_A1"], ["mask","N","R_A2"]]
  secret_param: mask
  premises: ["LEN_VALID: 4*len < 2^32", "PTR_ALIGN: exists k, a = 4*k"]
  exercises: [ct-closed-form-secret-independent, spec_lint-ct]

