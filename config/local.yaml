# Profile: local  (CLOQ_PROFILE=local or --profile local)
#
# Local-first: an Ollama model on the host/lab box is the primary, with optional CLOUD ESCALATION
# for hard goals. Overlaid on default.yaml — only the model block differs. Secrets come from env
# (CLOQ_API_KEY); never commit a key. Compose's `local` profile points base_url at the bundled
# ollama service (or host Ollama) via CLOQ_MODEL_BASE_URL.

model:
  base_url: http://localhost:11434/v1     # Ollama (override per-deployment with CLOQ_MODEL_BASE_URL)
  api_key: "ollama"                        # any non-empty string; Ollama ignores it
  name: qwen3-coder:30b
  # Cloud escalation: enabled (base_url + name set); the key is injected from env at run time
  # (CLOQ_ESCALATION_API_KEY / CLOQ_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY).
  escalation:
    base_url: https://api.anthropic.com/v1
    name: claude-opus-4-8
    api_key: null
